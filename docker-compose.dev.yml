# Local dev dependencies only — starts Weaviate so you can run the app natively.
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Use in-network Weaviate service name inside Docker.
      WEAVIATE_URL: http://weaviate:8080
      # Local dev Weaviate uses anonymous auth, so force empty key.
      WEAVIATE_API_KEY: ""
      # Map MinIO dynamically inside Docker network to avoid localhost timeouts
      MINIO_ENDPOINT: minio:9000
    depends_on:
      weaviate:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  #  streamlit:
  #    build:
  #      context: .
  #      dockerfile: Dockerfile.streamlit
  #    ports:
  #      - "8501:8501"
  #    environment:
  #      STREAMLIT_API_BASE_URL: http://backend:8000
  #    depends_on:
  #      backend:
  #        condition: service_healthy
  #    restart: unless-stopped

  weaviate:
    image: semitechnologies/weaviate:1.27.0
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test:
        ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  weaviate_data:
  minio_data:
